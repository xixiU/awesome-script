<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>验证码识别助手</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      color: #333;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      color: #666;
      font-size: 13px;
    }
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
      background: white;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
    }
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-field input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #1890ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 8px;
    }
    button:hover {
      background: #40a9ff;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.success {
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      color: #52c41a;
    }
    .status.error {
      background: #fff2f0;
      border: 1px solid #ffccc7;
      color: #ff4d4f;
    }
  </style>
</head>
<body>
  <h2>验证码识别助手</h2>

  <div class="field">
    <label for="backendUrl">后端服务地址</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:9876">
  </div>

  <div class="field checkbox-field">
    <input type="checkbox" id="autoFill">
    <label for="autoFill" style="margin: 0;">自动填充验证码</label>
  </div>

  <div class="field checkbox-field">
    <input type="checkbox" id="debug">
    <label for="debug" style="margin: 0;">调试模式</label>
  </div>

  <div class="field">
    <label for="provider">AI Provider</label>
    <select id="provider">
      <option value="ddddocr">ddddocr（本地 OCR）</option>
      <option value="openai">OpenAI（GPT-4o）</option>
      <option value="local">本地模型（Ollama）</option>
    </select>
  </div>

  <div class="field" id="apiKeyField" style="display: none;">
    <label for="apiKey">OpenAI API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
  </div>

  <button id="saveBtn">保存设置</button>
  <button id="testBtn" style="background: #52c41a; margin-top: 4px;">测试连接</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
