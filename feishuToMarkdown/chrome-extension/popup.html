<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书文档转 Markdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 400px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f7f8fa;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1f2329;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .drop-zone {
            border: 2px dashed #d0d3d9;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #0066FF;
            background: #f0f7ff;
        }
        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .drop-zone-text {
            font-size: 14px;
            color: #646a73;
            margin-bottom: 8px;
        }
        .drop-zone-hint {
            font-size: 12px;
            color: #8f959e;
        }
        .file-input {
            display: none;
        }
        .file-info {
            display: none;
            background: #f0f7ff;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #1f2329;
        }
        .file-info.show {
            display: block;
        }
        .file-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .file-size {
            color: #646a73;
            font-size: 12px;
        }
        .convert-btn {
            width: 100%;
            padding: 12px;
            background: #0066FF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .convert-btn:hover:not(:disabled) {
            background: #0052CC;
        }
        .convert-btn:disabled {
            background: #d0d3d9;
            cursor: not-allowed;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.loading {
            background: #fff7e6;
            color: #d46b08;
        }
        .status.success {
            background: #f0f9ff;
            color: #0958d9;
        }
        .status.error {
            background: #fff1f0;
            color: #cf1322;
        }
        .guide {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e6eb;
            font-size: 12px;
            color: #646a73;
            line-height: 1.6;
        }
        .guide-title {
            font-weight: 500;
            margin-bottom: 8px;
            color: #1f2329;
        }
        .guide ol {
            padding-left: 20px;
        }
        .guide li {
            margin: 4px 0;
        }
        .highlight {
            color: #0066FF;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 飞书文档转 Markdown</h1>

        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📄</div>
            <div class="drop-zone-text">拖拽 docx 文件到这里</div>
            <div class="drop-zone-hint">或点击选择文件</div>
        </div>

        <input type="file" id="fileInput" class="file-input" accept=".docx">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <button class="convert-btn" id="convertBtn" disabled>选择文件开始转换</button>

        <div class="status" id="status"></div>

        <div class="guide">
            <div class="guide-title">使用步骤：</div>
            <ol>
                <li>在飞书文档页面点击 <span class="highlight">更多 → 导出 → Word</span></li>
                <li>下载 docx 文件到本地</li>
                <li>将 docx 文件拖拽到上方区域</li>
                <li>点击转换按钮</li>
                <li>自动下载 Markdown ZIP 文件</li>
            </ol>
        </div>
    </div>

    <script src="libs/jszip.min.js"></script>
    <script src="libs/mammoth.browser.min.js"></script>
    <script src="libs/turndown.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
